{% extends 'exitems/layout.html' %}

{% block content %}
    <div class="mt-5 row justify-content-center">
        <div class="col-md-6">
            <h2>Přihlášení do systému</h2>
            <!-- Zatím jen prázdný vizuální formulář -->
            <form method="POST" class="mt-4">
    {% csrf_token %}
    
    {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
        </div>
    {% endfor %}
    
    <button type="submit" class="btn btn-dark w-100 mt-3">Přihlásit se</button>
    
    <p class="mt-3 text-center">Nemáte účet? <a href="{% url 'register' %}">Zaregistrujte se zde</a>.</p>
</form>
        </div>
    </div>
{% endblock %}
