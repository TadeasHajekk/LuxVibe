{% extends 'exitems/layout.html' %}

{% block content %}
    <div class="mt-5 row justify-content-center">
        <div class="col-md-6">
            <h2>Registrace nového účtu</h2>
            
            <form method="POST" class="mt-4">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <small class="text-danger">{{ field.errors|striptags }}</small>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <button type="submit" class="btn btn-success w-100 mt-3">Vytvořit účet</button>
            </form>
        </div>
    </div>
{% endblock %}
