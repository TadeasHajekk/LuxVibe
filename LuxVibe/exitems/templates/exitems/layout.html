<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxVibe - Eshop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">LUXVIBE</a>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Domů</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'products' %}">Produkty</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">O nás</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Kontakt</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'cart' %}">Kontakt</a></li>

                </ul>
                <ul class="navbar-nav">
    {% if user.is_authenticated %}
        <li class="nav-item me-3"><a class="nav-link fw-bold text-primary" href="{% url 'cart' %}">Můj košík</a></li>            
        <li class="nav-item"><a class="nav-link text-success fw-bold" href="#">Vítej, {{ user.username }}!</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Odhlásit se</a></li>
    {% else %}
        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Přihlášení / Registrace</a></li>
    {% endif %}
</ul>
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
